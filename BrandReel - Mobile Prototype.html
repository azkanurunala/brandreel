<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh; background: #161019; }
  body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; overscroll-behavior: none; }
  #root { width: 100%; min-height: 100vh; min-height: 100dvh; }

  /* Route transitions */
  @keyframes protoSlideInRight  { from { transform: translateX(100%); opacity: 0.8; } to { transform: translateX(0); opacity: 1; } }
  @keyframes protoSlideOutLeft  { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30%); opacity: 0; } }
  @keyframes protoSlideInLeft   { from { transform: translateX(-30%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes protoSlideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0.8; } }
  @keyframes protoFadeIn        { from { opacity: 0; } to { opacity: 1; } }
  @keyframes protoFadeOut       { from { opacity: 1; } to { opacity: 0; } }

  .proto-screen { will-change: transform, opacity; }
  /* Incoming screens render at their visible end-state — never gate visibility
     on the animation timeline (preview/print/export can freeze it at frame 0,
     which would trap content at opacity:0 / off-screen). Motion comes from the
     OUTGOING screen animating away, which can never hide live content. */
  .proto-in-push, .proto-in-pop, .proto-in-replace, .proto-in-tab,
  .proto-in-reset, .proto-in-init { animation: none; opacity: 1; transform: none; }
  .proto-out-push   { animation: protoSlideOutLeft  300ms cubic-bezier(0.22, 1, 0.36, 1) both; }
  .proto-out-pop    { animation: protoSlideOutRight 300ms cubic-bezier(0.22, 1, 0.36, 1) both; }
  .proto-out-replace, .proto-out-tab, .proto-out-reset { animation: protoFadeOut 200ms ease both; }

  @keyframes protoSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes protoBlip { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1); } }
  @keyframes protoToastIn { from { transform: translateY(-110%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
